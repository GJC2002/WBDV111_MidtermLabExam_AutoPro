    <h1> Book Your Appointment</h1>
    <br>
    <br>
    
    <div class="form">
        <form name="RegForm" onsubmit="return validateform()" onreset="resetErrors()">
            <p>
                <label for="fname">FirstName:</label>
                <input type="text" id="fname" name="FName" placeholder="Enter First Name" size="30" oninput="filterNameInput(event)"/>
                <span id="fname-error" class="error_message"></span>
            </p>

            <p>
                <label for="lname">LastName:</label>
                <input type="text" id="lname" name="LName" placeholder="Enter Last Name" size="30" oninput="filterNameInput(event)"/>
                <span id="lname-error" class="error_message"></span>
            </p>

            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="EMail" placeholder="Enter Email" size="30"/>
                <span id="email-error" class="error_message"></span>
            </p>

            <p>
                <label for="contact_num">Phone Number:</label>
                <input type="tel" id="contact_num" name="Contact_num" placeholder ="Enter Phone Number" size="30" inputmode="numeric" pattern="\d*" maxlength="11" oninput="filterNumberInput(event)"/>
                <span id="contact_num-error" class="error_message"></span>
            </p>

            <p>
                <label>Select services:</label>
            </p>
            <p style="font-family: Arial, Helvetica, sans-serif;">
                <label class="service-option">
                  <input type="checkbox" name="services" value="wheels"> Wheels
                </label><br>

                <label class="service-option">
                  <input type="checkbox" name="services" value="tires"> Tires
                </label><br>

                <label class="service-option">
                 <input type="checkbox" name="services" value="overland gear"> Overland Gear
                </label><br>

                <label class="service-option">
                  <input type="checkbox" name="services" value="4x4 accessories"> 4x4 Accessories
                </label><br>

                <label class="service-option">
                  <input type="checkbox" name="services" value="periodic maintenance"> Periodic Maintenance
                </label><br>

                <label class="service-option">
                 <input type="checkbox" name="services" value="mechanical"> Mechanical
                </label><br>

                <label class="service-option">
                 <input type="checkbox" name="services" value="change oil"> Change Oil
                </label><br>

                <label class="service-option">
                 <input type="checkbox" name="services" value="obd scanning"> OBD Scanning
                </label><br>

                <label class="service-option">
                 <input type="checkbox" name="services" value="camping"> Camping
                </label><br>

                <label class="service-option">
                 <input type="checkbox" name="services" value="merchandise"> Merchandise
                </label><br>

                <label class="service-option">
                    <input type="checkbox" id="others-checkbox" name="services" value="others"> Others
                    <input type="text" id="others-text" name="services-other" placeholder="Please specify other services">
                </label>

              <span id="services-error" class="error_message"></span>
            </p>

            <p>
               <label for="schedule">Book Schedule:</label>
               <input type="datetime-local" id="schedule" name="Schedule"/>
               <span id="schedule-error" class="error_message"></span>

    <script>
    function filterNameInput(event) {
        event.target.value = event.target.value.replace(/\d/g, '');
    }
    function filterNumberInput(event) {
        event.target.value = event.target.value.replace(/[^0-9]/g, '');
    }
    function validateform (){
        const fname = document.getElementById("fname").value;
        const lname = document.getElementById("lname").value;
        const email = document.getElementById("email").value;
        const contact_num = document.getElementById("contact_num").value;
        const services = document.querySelectorAll('input[name="services"]:checked');
        const othersCheckbox = document.getElementById("others-checkbox");
        const othersText = document.getElementById("others-text");
        const schedule = document.getElementById("schedule").value;


        const fnameERR = document.getElementById("fname-error");
        const lnameERR = document.getElementById("lname-error");
        const emailERR = document.getElementById("email-error");
        const contact_num_ERR = document.getElementById("contact_num-error");
        const servicesERR = document.getElementById("services-error");
        const scheduleERR = document.getElementById("schedule-error");
  

        fnameERR.textContent = "";
        lnameERR.textContent = "";
        emailERR.textContent = "";
        contact_num_ERR.textContent = "";
        servicesERR.textContent = "";
        scheduleERR.textContent = "";

     
        let inputValid = true;

        if(fname === "" || /\d/.test(fname)) {
            fnameERR.textContent = "Please Enter Your First Name.";
            inputValid = false;
        }
        if(lname === "" || /\d/.test(lname)) {
            lnameERR.textContent = "Please Enter Your Last Name.";
            inputValid = false;
        }
        if(email === "" || !email.includes("@") || !email.includes(".")) {
            emailERR.textContent = "Please Enter Your Valid Email Address."
            inputValid = false;
        }
        const phonePattern = /^\d{11}$/;
        if (contact_num === "" || !phonePattern.test(contact_num)) {
            contact_num_ERR.textContent = "Please enter a valid 11-digit phone number (numbers only).";
            inputValid = false;
        }
        if(services.length === 0) {
            servicesERR.textContent = "Please Select at least one Service.";
            inputValid = false;
        } 
         else if(othersCheckbox.checked && othersText.value.trim() === "") {
            servicesERR.textContent = "Please specify the 'others' service.";
            inputValid = false;
        }
        if(schedule === "" || !validateScheduleValue(schedule)) {
            scheduleERR.textContent = "Please select a valid schedule between 10:00 am and 05:30 pm.";
            inputValid = false;
        }
        if(inputValid) {
            alert("We are processing your request. We will notify you in your email.");
            return true;
        } else {
            return false;
        }
    }
    const othersCheckbox = document.getElementById("others-checkbox");
    const othersText = document.getElementById("others-text");

    othersText.disabled = true;

    othersCheckbox.addEventListener("change", () => {
    othersText.disabled = !othersCheckbox.checked;
    if (!othersCheckbox.checked) {
        othersText.value = "";
    }
});
    function resetErrors() {
        document.getElementById("fname-error").textContent = "";
        document.getElementById("lname-error").textContent = "";
        document.getElementById("email-error").textContent = "";
        document.getElementById("contact_num-error").textContent = "";
        document.getElementById("services-error").textContent = "";
        document.getElementById("schedule-error").textContent = "";
    }
    function formatToLocalDateTime(value) {
        const year = value.getFullYear();
        const month = String(value.getMonth() + 1).padStart(2, '0');
        const day = String(value.getDate()).padStart(2, '0');
        const hour = String(value.getHours()).padStart(2, '0');
        const minute = String(value.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hour}:${minute}`;
    }
    function getScheduleMin() {
        const now = new Date();
        const earliestToday = new Date(now);
        earliestToday.setHours(10, 0, 0, 0);
        const latestToday = new Date(now);
        latestToday.setHours(17, 30, 0, 0);

        let nextAvailable = new Date(now);
        if (nextAvailable < earliestToday) {
            nextAvailable = earliestToday;
        } else {
            const currentMinutes = nextAvailable.getMinutes();
            const currentSeconds = nextAvailable.getSeconds();
            nextAvailable.setSeconds(0, 0);
            if (currentSeconds > 0) {
                nextAvailable.setMinutes(currentMinutes + 1);
            }
        }

        if (nextAvailable > latestToday) {
            nextAvailable = new Date(now);
            nextAvailable.setDate(now.getDate() + 1);
            nextAvailable.setHours(10, 0, 0, 0);
            nextAvailable.setMinutes(0, 0, 0, 0);
        }

        return formatToLocalDateTime(nextAvailable);
    }
    function parseLocalDateTime(value) {
        const [datePart, timePart] = value.split('T');
        const [year, month, day] = datePart.split('-').map(Number);
        const [hour, minute] = timePart.split(':').map(Number);
        return new Date(year, month - 1, day, hour, minute, 0, 0);
    }
    function validateScheduleValue(value) {
        if (!value) return false;
        const selected = parseLocalDateTime(value);
        const now = new Date();
        if (selected < now) return false;

        if (selected.getDay() === 0) return false;

        const hour = selected.getHours();
        const minute = selected.getMinutes();
        if (hour < 10 || hour > 17 || (hour === 17 && minute > 30)) return false;
        return true;
    }
    function normalizeScheduleValue() {
        const schedule = document.getElementById("schedule");
        if (!schedule.value) return;

        let selected = parseLocalDateTime(schedule.value);
        const now = new Date();
        if (selected < now) {
            schedule.value = getScheduleMin();
            return;
        }
        if (selected.getDay() === 0) {
        selected.setDate(selected.getDate() + 1);
        selected.setHours(10, 0, 0, 0);
        }
        const hour = selected.getHours();
        const minute = selected.getMinutes();
        if (hour < 10) {
            selected.setHours(10, 0, 0, 0);
        } else if (hour > 17 || (hour === 17 && minute > 30)) {
            selected.setHours(17, 30, 0, 0);
        }

        schedule.value = formatToLocalDateTime(selected);
    }
    function applyScheduleConstraints() {
        const schedule = document.getElementById("schedule");
        schedule.min = getScheduleMin();
        schedule.addEventListener("input", () => {
            normalizeScheduleValue();
            if (schedule.value && !validateScheduleValue(schedule.value)) {
                schedule.setCustomValidity("Please choose a booking time between 10:00 and 17:30.");
            } else {
                schedule.setCustomValidity("");
            }
        });
        schedule.addEventListener("blur", normalizeScheduleValue);
        schedule.addEventListener("change", normalizeScheduleValue);
    }
    applyScheduleConstraints();
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const navToggle = document.getElementById('navToggle');
    const sidebarClose = document.getElementById('sidebarClose');

    function closeSidebar() {
        sidebar.classList.remove('active');
        sidebarOverlay.classList.remove('active');
    }

    navToggle.addEventListener('click', () => {
        sidebar.classList.add('active');
        sidebarOverlay.classList.add('active');
    });

    sidebarClose.addEventListener('click', closeSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
</script>
